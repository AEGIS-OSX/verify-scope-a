# build-gate.yml
# Mandatory CI gate: runs gitleaks secrets scan before next build.
# The deploy job has `needs: [build-gate]` — it cannot run unless this passes.
# Covers ticket 5823ef83-d5c7-4c1f-a52d-584d14a57f11 (systemic gitleaks skip).

name: Build Gate

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-gate:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run build-gate gitleaks scan
        run: |
          chmod +x scripts/build-gate-gitleaks.sh
          scripts/build-gate-gitleaks.sh .

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [build-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-gate, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (gitleaks gate passed)
        run: |
          echo "[build-gate] Deploy proceeding — gitleaks scan passed in build-gate job."
          # Add actual deploy command here (e.g. vercel --prod, aws s3 sync, etc.)
